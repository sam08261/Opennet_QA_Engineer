[pytest]
# Test discovery
testpaths = tests

# Default CLI options:
#   -v            verbose output (test names shown)
#   --html        generate HTML report
#   --self-contained-html  embed assets in the HTML (single file)
addopts =
    -v
    --html=reports/report.html
    --self-contained-html

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S

# Markers (add new scenario markers here as the suite grows)
markers =
    wap: Mobile/WAP test scenarios
    smoke: Quick smoke-check tests
    regression: Full regression suite
